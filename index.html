<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecommerce</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"/>

    
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="global-loader" class="loader-overlay" style="display: none">
      <div class="spinner"></div>
    </div>
    <header class="fixed-top">
      
      <nav class="container d-flex justify-content-between align-items-center fixed-top">
        <div class="brand-wrapper">
            <span class="logo-icon">✨</span> 
            <a class="logo-text text-decoration-none" href="./index.html">
                LUMINA<span class="tech-accent">TECH</span>
            </a>
        </div>
        
        <div class="controls d-flex flex-row justify-content-between">
            <select id="category-filter" class="m-1">
            <option value="all">All Categories</option>
          </select>
          <form id="search-form" class="m-1">
            <input
              type="text"
              id="search-input"
              placeholder="Search products..."
            />
            <button type="submit">search</button>
          </form>
          <select id="sort-price" class="m-1">
            <option value="default">Sort by Price</option>
            <option value="low">Low to High</option>
            <option value="high">High to Low</option>
          </select>
          <div class="cart-icon m-1" id="cart-toggle">
            🛒 <span id="cart-count">0</span>
          </div>
        </div>
    </nav>
    </header>

    <main>

      <section class="hero">
    <div class="container hero-wrapper">
        <div class="hero-content">
            <span class="hero-tag">New Season Arrivals</span>
            <h1>Everything You Need <span class="text-gradient">All in One Place</span></h1>
            <p>From the latest electronics to everyday home essentials. Discover quality products curated for every part of your life.</p>
        </div>
        <div class="hero-image-placeholder"></div>
    </div>
</section>

      <section class="container">
        <div id="product-grid" class="product-grid"></div>
        <div class="pagination-container text-center">
          <button id="load-more-btn" class="btn-secondary">
            Load More Products
          </button>
        </div>
      </section>
    </main>
    <div id="toast-container" class="app-notification-container"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
