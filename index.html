    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top shadow-sm">
    <div class="container">
        <div class="brand-wrapper navbar-brand d-flex align-items-center">
            <span class="logo-icon me-2">✨</span>
            <a class="logo-text text-decoration-none" href="./index.html">
                LUMINA<span class="tech-accent">TECH</span>
            </a>
        </div>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarControls" aria-controls="navbarControls" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarControls">
            <div class="navbar-nav ms-auto align-items-lg-center">
                
                <select id="category-filter" class="form-select form-select-sm m-lg-1 my-2 input-group">
                    <option value="all">All Categories</option>
                </select>

                <form id="search-form" class="d-flex m-lg-1 my-2 input-group">
                    <input class="form-control form-control-sm  me-2" type="text" id="search-input" placeholder="Search products...">
                    <button class="btn btn-sm btn-primary" type="submit">Search</button>
                </form>

                <select id="sort-price" class="form-select form-select-sm m-lg-1 my-2 input-group">
                    <option value="default">Sort Price</option>
                    <option value="low">Low to High</option>
                    <option value="high">High to Low</option>
                </select>

                <div class="cart-icon ms-lg-3 my-2 position-relative d-inline-block" id="cart-toggle" style="cursor: pointer;">
                    <span class="fs-4">🛒</span>
                    <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        0
                    </span>
                </div>
                
            </div>
        </div>
    </div>
</nav>

    </header>

    <main>

      <section class="hero">
    <div class="container hero-wrapper">
        <div class="hero-content">
            <span class="hero-tag">New Season Arrivals</span>
            <h1>Everything You Need <span class="text-gradient">All in One Place</span></h1>
            <p>From the latest electronics to everyday home essentials. Discover quality products curated for every part of your life.</p>
        </div>
        <div class="hero-image-placeholder"></div>
    </div>
</section>

      <section class="container">
        <div id="product-grid" class="product-grid"></div>
        <div class="pagination-container text-center">
          <button id="load-more-btn" class="btn-secondary">
            Load More Products
          </button>
        </div>
      </section>
    </main>
    <div id="toast-container" class="app-notification-container"></div>
