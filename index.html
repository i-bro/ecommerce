<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">
    
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">LUMINA<span>TECH</span></div>
            <div class="nav-controls">
                <select id="category-filter"><option value="all">All Categories</option></select>
                <div class="cart-icon" id="cart-toggle">
                    🛒 <span id="cart-count">0</span>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Elevate Your Workflow</h1>
            <p>Premium tech curated for the modern professional.</p>
            <button class="btn-primary">Shop Now</button>
        </section>

        <section class="container">
            <div class="controls">
                <input type="text" id="search-input" placeholder="Search products...">
                <select id="sort-price">
                    <option value="default">Sort by Price</option>
                    <option value="low">Low to High</option>
                    <option value="high">High to Low</option>
                </select>
            </div>
            <div id="product-grid" class="product-grid">
                </div>
                <div class="pagination-container text-center">
        <button id="load-more-btn" class="btn-secondary ">Load More Products</button>
    </div>
        </section>
    </main>

    <aside id="cart-sidebar" class="hidden">
        <div class="cart-content">
            <button id="close-cart">×</button>
            <h2>Your Cart</h2>
            <div id="cart-items"></div>
            <div class="cart-footer">
                <div class="total">Total: $<span id="cart-total">0.00</span></div>
                <button id="checkout-btn" class="btn-primary">Checkout</button>
            </div>
        </div>
    </aside>

    <div id="toast-container"></div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
